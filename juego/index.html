<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Juego 4x4 - Gana quien coloree todo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e0e0e0;
            font-family: Arial, sans-serif;
            padding: 16px;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }

        .tablero {
            display: grid;
            grid-template-columns: repeat(4, minmax(65px, 85px));
            grid-template-rows: repeat(4, minmax(65px, 85px));
            gap: 8px;
            background-color: #1e3a5f;
            padding: 16px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            width: 100%;
            justify-content: center;
        }

        .celda {
            background-color: #3b82f6;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: inset 0 -2px 0 #1e40af, 0 2px 4px rgba(0,0,0,0.2);
        }

        .celda:hover {
            background-color: #60a5fa;
            transform: scale(0.98);
        }

        .celda:active {
            transform: scale(0.96);
        }

        .celda.black {
            background-color: #111111;
            box-shadow: inset 0 -1px 0 #444;
        }
        .celda.white {
            background-color: #f9f9f9;
            box-shadow: inset 0 -1px 0 #ccc;
        }
        .celda.blue {
            background-color: #3b82f6;
        }

        .info {
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            background: white;
            padding: 8px 20px;
            border-radius: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: auto;
        }

        button {
            background-color: #2c3e66;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        button:hover {
            background-color: #1e2a4a;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        @media (max-width: 450px) {
            .tablero {
                grid-template-columns: repeat(4, minmax(60px, 70px));
                grid-template-rows: repeat(4, minmax(60px, 70px));
                gap: 6px;
                padding: 12px;
            }
            .info {
                font-size: 1rem;
                padding: 6px 16px;
            }
            button {
                font-size: 0.9rem;
                padding: 6px 20px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="tablero" id="tablero"></div>
    <div class="info" id="turnoInfo">🎨 Tu turno (Negro)</div>
    <button id="resetBtn">🔄 Reiniciar juego</button>
</div>

<script>
    const SIZE = 4;
    let board = Array(SIZE).fill().map(() => Array(SIZE).fill('blue'));
    let currentTurn = 'black';
    let gameOver = false;
    let computerTimeout = null;

    const tableroDiv = document.getElementById('tablero');
    const turnoInfo = document.getElementById('turnoInfo');
    const resetBtn = document.getElementById('resetBtn');

    function paintArea(row, col, color) {
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                const nr = row + dr;
                const nc = col + dc;
                if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                    board[nr][nc] = color;
                }
            }
        }
    }

    function isAllColor(targetColor) {
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                if (board[i][j] !== targetColor) return false;
            }
        }
        return true;
    }

    function renderBoard() {
        const celdas = document.querySelectorAll('.celda');
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const idx = i * SIZE + j;
                const celdaDiv = celdas[idx];
                const estado = board[i][j];
                celdaDiv.classList.remove('blue', 'black', 'white');
                celdaDiv.classList.add(estado);
            }
        }
    }

    function endGame(winner) {
        if (gameOver) return;
        gameOver = true;
        if (computerTimeout) clearTimeout(computerTimeout);
        if (winner === 'black') {
            alert('🎉 ¡HAS GANADO! 🎉 Has pintado todo el tablero de negro.');
            turnoInfo.innerHTML = '🏆 ¡VICTORIA HUMANA! 🏆';
        } else if (winner === 'white') {
            alert('🤖 ¡GANA LA COMPUTADORA! 🤖 Pintó todo de blanco.');
            turnoInfo.innerHTML = '🏆 ¡VICTORIA COMPUTADORA! 🏆';
        }
    }

    function makeMove(row, col, playerColor) {
        if (gameOver) return false;
        paintArea(row, col, playerColor);
        renderBoard();

        if (isAllColor('black')) {
            endGame('black');
            return true;
        } else if (isAllColor('white')) {
            endGame('white');
            return true;
        }
        return true;
    }

    function computerMove() {
        if (gameOver) return;
        if (currentTurn !== 'white') return;

        let blueCells = [];
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                if (board[i][j] === 'blue') {
                    blueCells.push([i, j]);
                }
            }
        }

        if (blueCells.length === 0) {
            if (isAllColor('black')) endGame('black');
            else if (isAllColor('white')) endGame('white');
            return;
        }

        const randomIndex = Math.floor(Math.random() * blueCells.length);
        const [row, col] = blueCells[randomIndex];
        makeMove(row, col, 'white');
        if (!gameOver) {
            currentTurn = 'black';
            turnoInfo.innerHTML = '🎨 Tu turno (Negro)';
        }
    }

    function humanMove(row, col) {
        if (gameOver) return;
        if (currentTurn !== 'black') return;

        makeMove(row, col, 'black');
        if (gameOver) return;

        currentTurn = 'white';
        turnoInfo.innerHTML = '💻 Computadora (Blanco) ...';
        if (computerTimeout) clearTimeout(computerTimeout);
        computerTimeout = setTimeout(() => {
            computerMove();
            renderBoard();
        }, 250);
    }

    function buildBoard() {
        tableroDiv.innerHTML = '';
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                const celda = document.createElement('div');
                celda.classList.add('celda', 'blue');
                celda.addEventListener('click', (function(fila, columna) {
                    return function() { humanMove(fila, columna); };
                })(i, j));
                tableroDiv.appendChild(celda);
            }
        }
        renderBoard();
    }

    function resetGame() {
        if (computerTimeout) {
            clearTimeout(computerTimeout);
            computerTimeout = null;
        }
        board = Array(SIZE).fill().map(() => Array(SIZE).fill('blue'));
        currentTurn = 'black';
        gameOver = false;
        turnoInfo.innerHTML = '🎨 Tu turno (Negro)';
        renderBoard();
    }

    resetBtn.addEventListener('click', resetGame);
    buildBoard();
</script>
</body>
</html>
